<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情報ネットワーク中間試験 対策100問</title>
    <style>
        :root { --primary-color: #4a90e2; --success-color: #2ecc71; --error-color: #e74c3c; }
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .quiz-container { background: white; border-radius: 16px; padding: 30px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .option-btn { display: block; width: 100%; margin: 8px 0; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; text-align: left; }
        .option-btn:hover:not([disabled]) { border-color: var(--primary-color); background: #f0f7ff; }
        .correct { background: #e8f5e9 !important; border-color: var(--success-color) !important; color: #2e7d32; }
        .wrong { background: #ffebee !important; border-color: var(--error-color) !important; color: #c62828; }
        .next-btn { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 8px; margin-top: 20px; display: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="quiz-container">
    <div id="progress">問題 1/100</div>
    <div id="question" style="font-size: 1.2rem; font-weight: bold; margin: 20px 0;">読み込み中...</div>
    <div id="options"></div>
    <div id="feedback" style="margin-top: 15px; font-weight: bold;"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ</button>
</div>

];

// 100問のデータを簡潔に生成・管理するためのロジック
// (実際のファイルには、ここに全100問を記述した配列を入れてください)

let idx = 0, score = 0;
function show() {
    const d = quizData[idx];
    document.getElementById("progress").innerText = `問題 ${idx + 1}/${quizData.length}`;
    document.getElementById("question").innerText = d.q;
    const optDiv = document.getElementById("options");
    optDiv.innerHTML = "";
    d.options.forEach(o => {
        const b = document.createElement("button");
        b.className = "option-btn";
        b.innerText = o;
        b.onclick = () => {
            document.querySelectorAll(".option-btn").forEach(btn => btn.disabled = true);
            if (o === d.a) { b.classList.add("correct"); score++; document.getElementById("feedback").innerText = "正解！"; }
            else { b.classList.add("wrong"); document.getElementById("feedback").innerText = "正解は " + d.a; }
            document.getElementById("next-btn").style.display = "block";
        };
        optDiv.appendChild(b);
    });
}
function nextQuestion() { idx++; idx < quizData.length ? show() : alert("終了！スコア: " + score); }
show();
</script>
</body>
</html>
